<!doctype html>
<html lang="en" data-bs-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Brian Le</title>
    <link rel="icon" type="image/x-icon" href="assets/8bit_me_transparent.png">
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link href="css/styles.css" type="text/css" rel="stylesheet" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
      rel="stylesheet"
    />
    <script defer src="js/index.js"></script>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://code.jquery.com/jquery-4.0.0.min.js"
      integrity="sha256-OaVG6prZf4v69dPg6PhVattBXkcOWQB62pdZ3ORyrao="
      crossorigin="anonymous"
    ></script>
    <script src="https://kit.fontawesome.com/31b4bdf292.js" crossorigin="anonymous"></script>
  </head>
  <body>
    <nav
      class="navbar navbar-dark bg-dark navbar-expand-lg mt-2 mx-2 sticky-top"
      id="mainNavBar"
    >
      <div class="container-fluid">
        <a class="navbar-brand" href="#">
          <img
            src="/assets/8bit_me.png"
            alt="8-bit-brian"
            width="95"
            class="d-inline-block align-middle"
          />
        </a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarCollapsableContent"
          aria-controls="navbarCollapsableContent"
          aria-expanded="false"
          aria-label="Toggle navigation"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarCollapsableContent">
          <ul class="navbar-nav me-auto mb-2 mb-lg-0">
            <li class="nav-item">
              <a class="nav-link" href="#"><h5>Brian Le</h5></a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="#aboutSection"><h5>About</h5></a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="#experienceSection"
                ><h5>Experience</h5></a
              >
            </li>
            <li class="nav-item">
              <a class="nav-link" href="#projectsSection"><h5>Projects</h5></a>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <h1 id="aboutSection" class="text-center my-5 fw-bolder">About</h1>
    <section class="mt-5 container">
      <div class="row align-items-center d-flex my-5">
        <div class="col-md-12 col-lg-5 d-flex justify-content-center">
          <img
            id="brianPotrait"
            src="assets/portrait.jpg"
            alt="Brian portrait image"
            class="rounded img-fluid"
          />
        </div>
        <div class="col-lg-2"></div>
        <div class="col-md-12 col-lg-5 my-5 text-lg-start text-center">
          <h1 id="aboutTitle"></h1>
          <p id="aboutText"></p>
          <div class="row mt-4">
            <div id="expMetrics"  class="col-6 text-center">
              <h2>+2</h2>
              <p>YEARS OF EXPERIENCE</p>
            </div>
            <div id="expMetrics" class="col-6 text-center">
              <h2>+5</h2>
              <p>PROJECTS COMPLETED</p>
            </div>
          </div>
        </div>
      </div>

      <div class="row align-items-center my-5">
        <div class="col-md-12 col-lg-5 d-flex justify-content-center">
          <img
            id="psuLogo"
            src="assets/psu_logo.png"
            alt="PSU logo"
            class="rounded img-fluid"
          />
        </div>
        <div class="col-lg-2"></div>
        <div class="col-md-12 col-lg-5 mt-5 text-lg-start text-center">
          <h1>Computer Science Major</h1>
          <p id="educationText"></p>
        </div>
      </div>

      <h1 id="experienceSection" class="text-center fw-bolder">Experience</h1>
      <div id="experience" class="row align-items-center my-5"></div>

      <h1 id="projectsSection" class="text-center fw-bolder">Projects</h1>
      <div id="projects" class="row align-items-center my-5"></div>

      <h1 id="contactSection" class="text-center fw-bolder">Contact</h1>
      <div class="row align-items-center my-5">
        <div class="col-4"></div>
        <div class="col-1 d-flex justify-content-center my-3">
          <i id="icons" class="fa-solid fa-envelope fa-4x"></i>
        </div>
        <div class="col-2"></div>
        <div class="col-5 text-start">
          <h1>Email</h1>
        </div>

        <div class="col-4"></div>
        <div class="col-1 d-flex justify-content-center my-3">
          <i class="fa-brands fa-linkedin fa-4x"></i>
        </div>
        <div class="col-2"></div>
        <div class="col-5 text-start">
          <h1>LinkedIn</h1>
        </div>

        <div class="col-4"></div>
        <div class="col-1 d-flex justify-content-center my-3">
          <i class="fa-brands fa-github fa-4x"></i>
        </div>
        <div class="col-2"></div>
        <div class="col-5 text-start">
          <h1>GitHub</h1>
        </div>
      </div>
    </section>
  </body>
</html>
